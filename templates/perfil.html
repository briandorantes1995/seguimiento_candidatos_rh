<html>
<head>
<title>Mi Perfil</title>
<meta charset="utf-8">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"></script>
<script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
</head>
<body>
<div class="max-w-4xl mx-auto p-6">
    <a href="/home" class="group inline-flex items-center justify-center w-10 h-10 rounded-full border border-slate-200 hover:bg-slate-100 hover:border-slate-300 transition-all duration-200 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-slate-700 group-hover:-translate-x-1 transition-transform">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
    </a>

    <h1 class="text-2xl font-bold mb-2">Mi Perfil</h1>
    <p class="text-gray-600 mb-6">Actualiza tu nombre y avatar.</p>

    <form
        hx-ext="json-enc"
        hx-put="/usuarios/me"
        hx-target="#perfil-result"
        hx-swap="innerHTML"
        class="bg-white border rounded-lg p-6 mb-8 shadow-sm">

        <div class="grid gap-4 md:grid-cols-2">
            <div>
                <label for="name" class="block text-sm font-medium mb-1">Nombre</label>
                <input
                    id="name"
                    name="name"
                    type="text"
                    value="{{ current_user.name }}"
                    class="w-full rounded border px-3 py-2">
            </div>
        </div>

        <button type="submit" class="mt-4 rounded bg-slate-800 px-4 py-2 text-white hover:bg-slate-700">
            Guardar Cambios
        </button>

    </form>

    <h2 class="text-xl font-semibold mb-4 text-slate-800">Avatar</h2>

    <form
        hx-encoding="multipart/form-data"
        hx-post="/usuarios/me/avatar"
        hx-target="#perfil-result"
        hx-swap="innerHTML"
        class="bg-white border rounded-lg p-6 mb-8 shadow-sm">

        <div class="flex items-center gap-6">
            <div class="shrink-0">
                {% if current_user.avatar %}
                <img src="{{ current_user.avatar }}"
                     class="w-16 h-16 rounded-full object-cover border">
                {% else %}
                <div class="w-16 h-16 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 text-lg font-semibold">
                    {{ current_user.name[0] | upper }}
                </div>
                {% endif %}
            </div>

            <div class="flex-1">
                <label for="avatar" class="block text-sm font-medium mb-1">Seleccionar imagen</label>
                <input
                    id="avatar"
                    name="file"
                    type="file"
                    accept="image/*"
                    class="w-full text-sm file:mr-3 file:rounded file:border-0 file:bg-slate-100 file:px-3 file:py-1 file:text-sm file:font-medium hover:file:bg-slate-200">
            </div>

            <div>
                <button type="submit"
                    class="rounded bg-slate-800 px-4 py-2 text-white hover:bg-slate-700">
                    Subir
                </button>
            </div>
        </div>

    </form>

    <h2 class="text-xl font-semibold mb-4 text-slate-800">Cambiar Contraseña</h2>

    <form
        hx-ext="json-enc"
        hx-put="/usuarios/me/password"
        hx-target="#password-result"
        hx-swap="innerHTML"
        class="bg-white border rounded-lg p-6 mb-8 shadow-sm">

        <div class="grid gap-4 md:grid-cols-2">

            <div>
                <label for="current_password" class="block text-sm font-medium mb-1">Contraseña Actual</label>
                <input
                    id="current_password"
                    name="current_password"
                    type="password"
                    placeholder="••••••••"
                    class="w-full rounded border px-3 py-2">
            </div>

            <div>
                <label for="new_password" class="block text-sm font-medium mb-1">Nueva Contraseña</label>
                <input
                    id="new_password"
                    name="new_password"
                    type="password"
                    placeholder="••••••••"
                    class="w-full rounded border px-3 py-2">
            </div>

        </div>

        <button type="submit" class="mt-4 rounded bg-slate-800 px-4 py-2 text-white hover:bg-slate-700">
            Actualizar Contraseña
        </button>

    </form>

    <div id="perfil-result"></div>
    <div id="password-result"></div>
</div>
</body>
</html>
