<tr id="doc-{{ doc.id }}">
    <td class="px-4 py-3">{{ doc.document_type.value }}</td>
    <td class="px-4 py-3">{{ doc.file_name }}</td>
    <td class="px-4 py-3">
        <a href="{{ doc.file_url }}" target="_blank"
           class="text-blue-600 hover:underline">Ver</a>
    </td>
    <td class="px-4 py-3">
        <button
            class="text-blue-600 hover:underline"
            hx-get="/papeleria/{{ doc.id }}/edit"
            hx-target="#doc-{{ doc.id }}"
            hx-swap="outerHTML">
            Editar
        </button>
    </td>
    <td class="px-4 py-3">
        <button
            class="text-red-600 hover:underline"
            hx-delete="/papeleria/{{ doc.id }}"
            hx-target="#doc-{{ doc.id }}"
            hx-swap="outerHTML"
            hx-confirm="¿Está seguro de eliminar?">
            Eliminar
        </button>
    </td>
</tr>
