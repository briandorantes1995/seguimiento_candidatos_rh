<div id="auth-container">
    <h2 class="text-xl font-semibold text-center mb-2">Verificación en dos pasos</h2>
    <p class="text-sm text-slate-600 text-center mb-6">Ingresa el código de 6 dígitos de tu aplicación Authenticator.</p>

    <div id="otp-error" class="text-sm text-red-600 text-center min-h-[20px] mb-2"></div>

    <div class="space-y-4">

        <div>
            <input
                type="text"
                id="otp-challenge-code"
                name="otp_code"
                placeholder="000000"
                maxlength="6"
                pattern="[0-9]{6}"
                inputmode="numeric"
                autocomplete="one-time-code"
                class="w-full rounded-lg border px-3 py-2 text-center text-2xl tracking-[0.5em] focus:outline-none focus:ring-2 focus:ring-slate-300">
        </div>

        <button
            type="button"
            class="w-full rounded-lg bg-slate-900 text-white py-2 hover:bg-slate-800 transition"
            hx-post="/auth/verify-otp"
            hx-vals='{"csrf_token": "{{ csrf_token }}"}'
            hx-include="#otp-challenge-code"
            hx-target="#auth-container"
            hx-swap="outerHTML">
            Verificar
        </button>

    </div>
</div>
