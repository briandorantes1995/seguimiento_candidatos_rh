    <tr id="candidato-{{ candidato.id }}">
    <td class="px-4 py-3">{{ candidato.name }}</td>
    <td class="px-4 py-3">{{ candidato.puesto.name }}</td>
    <td class="px-4 py-3">{{ candidato.status }}</td>
    <td class="px-4 py-3">{{ candidato.first_contact }}</td>
    <td class="px-4 py-3">
        <a
        href="/entrevistas/candidato/{{ candidato.id }}"
        class="text-blue-600 hover:underline">
        Postulaciones
    </a>
    </td>
    <td class="px-4 py-3">
        <button
            class="text-blue-600 hover:underline"
            hx-get="/candidatos/{{ candidato.id }}/edit"
            hx-target="#candidato-{{ candidato.id }}"
            hx-swap="outerHTML">
            Editar
        </button>
    </td>
    <td class="px-4 py-3">
        <button
            class="text-blue-600 hover:underline"
            hx-delete="/candidatos/{{ candidato.id }}/"
            hx-target="#candidato-{{ candidato.id }}"
            hx-swap="outerHTML">
            Eliminar
        </button>
    </td>
</tr>
