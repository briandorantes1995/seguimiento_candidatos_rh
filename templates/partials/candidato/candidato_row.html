    <tr id="candidato-{{ candidato.id }}">
    <td class="px-4 py-3">{{ candidato.name }}</td>
    <td class="px-4 py-3">{{ candidato.email }}</td>
    <td class="px-4 py-3">{{ candidato.telefono }}</td>
    <td class="px-4 py-3">
        <button
            class="text-blue-600 hover:underline"
            hx-get="/candidatos/{{ candidato.id }}/edit"
            hx-target="#candidato-{{ candidato.id }}"
            hx-swap="outerHTML">
            Editar
        </button>
    </td>
    <td class="px-4 py-3">
        <button
            class="text-blue-600 hover:underline"
            hx-delete="/candidatos/{{ candidato.id }}/"
            hx-target="#candidato-{{ candidato.id }}"
            hx-swap="outerHTML"
            hx-confirm="¿Está seguro de eliminar?">
            Eliminar
        </button>
    </td>
</tr>
