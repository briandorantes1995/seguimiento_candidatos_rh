<tr id="usuario-{{ usuario.id }}" hx-ext="json-enc">
    <td class="px-4 py-3">
        <input type="text" name="name" value="{{ usuario.name }}"
            class="w-full rounded border px-2 py-1">
    </td>
    <td class="px-4 py-3">
        <input type="email" name="email" value="{{ usuario.email }}"
            class="w-full rounded border px-2 py-1">
    </td>
    <td class="px-4 py-3">
        <select name="user_type" class="w-full rounded border px-2 py-1">
            <option value="ADMIN" {% if usuario.user_type == "ADMIN" %}selected{% endif %}>Admin</option>
            <option value="RECRUITER" {% if usuario.user_type == "RECRUITER" %}selected{% endif %}>Recruiter</option>
        </select>
    </td>
    <td class="px-4 py-3">
        <button class="text-green-600"
            hx-put="/usuarios/{{ usuario.id }}"
            hx-include="closest tr"
            hx-target="#usuario-{{ usuario.id }}"
            hx-swap="outerHTML">
            Guardar
        </button>
        <button class="text-gray-600 ml-2"
            hx-get="/usuarios/{{ usuario.id }}"
            hx-target="#usuario-{{ usuario.id }}"
            hx-swap="outerHTML">
            Cancelar
        </button>
    </td>
</tr>
