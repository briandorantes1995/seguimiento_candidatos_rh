<tr id="usuario-{{ usuario.id }}">
    <td class="px-4 py-3">{{ usuario.name }}</td>
    <td class="px-4 py-3">{{ usuario.email }}</td>
    <td class="px-4 py-3">{{ usuario.user_type }}</td>
    <td class="px-4 py-3">
        <button
            class="text-blue-600 hover:underline"
            hx-get="/usuarios/{{ usuario.id }}/edit"
            hx-target="#usuario-{{ usuario.id }}"
            hx-swap="outerHTML">
            Editar
        </button>
    </td>
    <td class="px-4 py-3">
        <button
            class="text-red-600 hover:underline"
            hx-delete="/usuarios/{{ usuario.id }}/"
            hx-target="#usuario-{{ usuario.id }}"
            hx-swap="outerHTML">
            Eliminar
        </button>
    </td>
</tr>
