<tr id="usuario-{{ usuario.id }}">
    <td class="px-4 py-3">
        <div class="flex items-center gap-2">
            {% if usuario.avatar %}
            <img src="{{ usuario.avatar }}" class="w-7 h-7 rounded-full object-cover">
            {% else %}
            <div class="w-7 h-7 rounded-full bg-slate-200 flex items-center justify-center text-xs font-semibold text-slate-500">
                {{ usuario.name[0] | upper }}
            </div>
            {% endif %}
            {{ usuario.name }}
        </div>
    </td>
    <td class="px-4 py-3">{{ usuario.email }}</td>
    <td class="px-4 py-3">{{ usuario.user_type.value }}</td>
    <td class="px-4 py-3">
        <button
            class="text-blue-600 hover:underline"
            hx-get="/usuarios/{{ usuario.id }}/edit"
            hx-target="#usuario-{{ usuario.id }}"
            hx-swap="outerHTML">
            Editar
        </button>
    </td>
    <td class="px-4 py-3">
        <button
            class="text-red-600 hover:underline"
            hx-delete="/usuarios/{{ usuario.id }}"
            hx-target="#usuario-{{ usuario.id }}"
            hx-swap="outerHTML"
            hx-confirm="¿Está seguro de eliminar?">
            Eliminar
        </button>
    </td>
</tr>
