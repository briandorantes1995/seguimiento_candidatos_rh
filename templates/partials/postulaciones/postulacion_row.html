    <tr id="postulacion-{{ postulacion.id }}">
    <td class="px-4 py-3">{{ postulacion.candidato.name }}</td>
    <td class="px-4 py-3">{{ postulacion.puesto.name}}</td>
    <td class="px-4 py-3">{{ postulacion.first_contact }}</td>
    <td class="px-4 py-3">{{ postulacion.status }}</td>
    <td class="px-4 py-3">
        <a
        href="/entrevistas/postulacion/{{ postulacion.id }}"
        class="text-blue-600 hover:underline">
        Ver Entrevistas
    </a>
    </td>
    <td class="px-4 py-3">
        <button
            class="text-blue-600 hover:underline"
            hx-get="/postulaciones/{{ postulacion.id }}/edit"
            hx-target="#postulacion-{{ postulacion.id }}"
            hx-swap="outerHTML">
            Editar
        </button>
    </td>
    <td class="px-4 py-3">
        <button
            class="text-blue-600 hover:underline"
            hx-delete="/postulaciones/{{ postulacion.id }}/"
            hx-target="#postulacion-{{ postulacion.id }}"
            hx-swap="outerHTML">
            Eliminar
        </button>
    </td>
</tr>
