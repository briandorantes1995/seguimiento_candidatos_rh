<html>
<head>
<title>Formulario</title>
<meta charset="utf-8">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"></script>
<script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
<style>
    .htmx-indicator {
        display: none;
    }

    .htmx-request .htmx-indicator {
        display: block;
    }
</style>
    
</head>
<body>
<form>
  <div class="space-y-12">
    <div class="border-b border-gray-900/10 pb-12">
      <a href="/home"
 class="group inline-flex items-center justify-center
        w-10 h-10 rounded-full border border-slate-200
        hover:bg-slate-100 hover:border-slate-300
        transition-all duration-200 mb-6">

<svg
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="2"
    stroke="currentColor"
    class="w-5 h-5 text-slate-700
           group-hover:-translate-x-1 transition-transform">
    <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M15.75 19.5L8.25 12l7.5-7.5" />
</svg>
</a>
      <h2 class="text-base/7 font-semibold text-gray-900">Candidato</h2>
      <p class="mt-1 text-sm/6 text-gray-600">Informacion del Candidato(Prospecto).</p>

        <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">

        <div class="sm:col-span-4">
          <label for="bussiness" class="block text-sm/6 font-medium text-gray-900">Empresa</label>
          <div class="mt-2">
            <div class="flex items-center rounded-md bg-white pl-3 outline-1 -outline-offset-1 outline-gray-300 focus-within:outline-2 focus-within:-outline-offset-2 focus-within:outline-indigo-600">
              <input id="bussiness" type="text" name="bussiness" placeholder="Acme" class="block min-w-0 grow bg-white py-1.5 pr-3 pl-1 text-base text-gray-900 placeholder:text-gray-400 focus:outline-none sm:text-sm/6" />
            </div>
          </div>

           <div class="sm:col-span-4">
          <label for="job" class="block text-sm/6 font-medium text-gray-900">Puesto/Trabajo</label>
          <div class="mt-2">
            <div class="flex items-center rounded-md bg-white pl-3 outline-1 -outline-offset-1 outline-gray-300 focus-within:outline-2 focus-within:-outline-offset-2 focus-within:outline-indigo-600">
              <input id="job" type="text" name="job" placeholder="helper" class="block min-w-0 grow bg-white py-1.5 pr-3 pl-1 text-base text-gray-900 placeholder:text-gray-400 focus:outline-none sm:text-sm/6" />
            </div>
          </div>

        <div class="sm:col-span-4">
          <label for="applicant" class="block text-sm/6 font-medium text-gray-900">Candidato</label>
          <div class="mt-2">
            <div class="flex items-center rounded-md bg-white pl-3 outline-1 -outline-offset-1 outline-gray-300 focus-within:outline-2 focus-within:-outline-offset-2 focus-within:outline-indigo-600">
              <input id="applicant" type="text" name="applicant" placeholder="johndoe" class="block min-w-0 grow bg-white py-1.5 pr-3 pl-1 text-base text-gray-900 placeholder:text-gray-400 focus:outline-none sm:text-sm/6" />
            </div>
          </div>

        </div>
</form>
</body>
</html>
