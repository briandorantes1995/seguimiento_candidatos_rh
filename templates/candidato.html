<html>
<head>
<title>Formulario Candidatos</title>
<meta charset="utf-8">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"></script>
<script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
<style>
    .htmx-indicator {
        display: none;
    }

    .htmx-request .htmx-indicator {
        display: block;
    }
</style>
    
</head>
<body>
<div class="max-w-4xl mx-auto p-6">
<a href="/candidatos/form"
 class="group inline-flex items-center justify-center
        w-10 h-10 rounded-full border border-slate-200
        hover:bg-slate-100 hover:border-slate-300
        transition-all duration-200 mb-6">

<svg
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="2"
    stroke="currentColor"
    class="w-5 h-5 text-slate-700
           group-hover:-translate-x-1 transition-transform">
    <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M15.75 19.5L8.25 12l7.5-7.5" />
</svg>
</a>

<h1 class="text-2xl font-bold mb-2">Candidatos</h1>
<p class="text-gray-600 mb-6">
    Administración de Entrevistas.
</p>

<div class="max-w-6xl mx-auto p-6">

    <div class="flex justify-between items-center mb-6">

        <div>
            <h1 class="text-3xl font-bold">
                {{ candidato.name }}
            </h1>

            <p class="text-gray-500">
                {{ candidato.puesto.name }}
            </p>

            <p class="text-gray-500">
                {{ candidato.status }}
            </p>
        </div>

        <button
            onclick="openModal()"
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">

            Nueva Entrevista

        </button>

    </div>

  <div class="overflow-x-auto bg-white border rounded-lg shadow-sm">
    <table class="min-w-full">
        <thead class="bg-slate-100">
                <tr>
                    <th class="px-4 py-3 text-left">Fecha</th>
                    <th class="px-4 py-3 text-left">Encargado</th>
                    <th class="px-4 py-3 text-left">Comentarios</th>
                    <th colspan=2 class="px-4 py-3 text-left">Acciones</th>
                </tr>
            </thead>

           <tbody
            id="entrevistas"
            hx-get="/entrevistas/"
            hx-trigger="load"
            hx-target="this"
            hx-swap="innerHTML">
        </tbody>

        </table>

    </div>

</div>

{% include "partials/entrevista/entrevista_modal.html" %}

</body>
</html>
