<html>
<head>
<title>Formulario Candidatos</title>
<meta charset="utf-8">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"></script>
<script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
<style>
    .htmx-indicator {
        display: none;
    }

    .htmx-request .htmx-indicator {
        display: block;
    }
</style>
    
</head>
<body>
<div class="max-w-4xl mx-auto p-6">
<a href="/home"
 class="group inline-flex items-center justify-center
        w-10 h-10 rounded-full border border-slate-200
        hover:bg-slate-100 hover:border-slate-300
        transition-all duration-200 mb-6">

<svg
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="2"
    stroke="currentColor"
    class="w-5 h-5 text-slate-700
           group-hover:-translate-x-1 transition-transform">
    <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M15.75 19.5L8.25 12l7.5-7.5" />
</svg>
</a>

<h1 class="text-2xl font-bold mb-2">Candidatos</h1>
<p class="text-gray-600 mb-6">
    Administración de candidatos registrados.
</p>

<form
    hx-ext="json-enc"
    hx-post="/candidatos/"
    hx-target="#candidatos"
    hx-swap="beforeend"
    class="bg-white border rounded-lg p-6 mb-8 shadow-sm">

    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="grid gap-4 md:grid-cols-2">

        <div>
            <label for="name" class="block text-sm font-medium mb-1">
                Nombre
            </label>
            <input
                id="name"
                name="name"
                type="text"
                placeholder="Acme"
                class="w-full rounded border px-3 py-2">
        </div>

       <div>
            <label for="telefono" class="block text-sm font-medium mb-1">
                Telefono
            </label>
            <input
                id="telefono"
                name="telefono"
                type="number"
                placeholder="Acme"
                class="w-full rounded border px-3 py-2">
        </div>

         <div>
            <label for="name" class="block text-sm font-medium mb-1">
                Correo
            </label>
            <input
                id="email"
                name="email"
                type="email"
                placeholder="Acme"
                class="w-full rounded border px-3 py-2">
        </div>

    </div>

    <button
        type="submit"
        class="mt-4 rounded bg-slate-800 px-4 py-2 text-white hover:bg-slate-700">
        Agregar Candidatos
    </button>

</form>

<div class="overflow-x-auto bg-white border rounded-lg shadow-sm">
    <table class="min-w-full">
        <thead class="bg-slate-100">
            <tr>
                <th class="px-4 py-3 text-left">Nombre</th>
                <th class="px-4 py-3 text-left">Telefono</th>
                <th class="px-4 py-3 text-left">Correo</th>
                <th colspan=3 class="px-4 py-3 text-left">Acciones</th>
            </tr>
        </thead>

        <tbody
            id="candidatos"
            hx-get="/candidatos/"
            hx-trigger="load, list-changed from:body"
            hx-target="this"
            hx-swap="innerHTML">
        </tbody>
    </table>
</div>
</div>

<div id="toast" class="fixed top-4 right-4 z-50 hidden text-white px-5 py-3 rounded-lg shadow-lg text-sm font-medium transition-opacity duration-300"></div>

<script>
    document.addEventListener('show-toast', function(e) {
        var toast = document.getElementById('toast');
        var data = e.detail.value;
        var message = typeof data === 'string' ? data : data.message;
        var type = typeof data === 'string' ? 'success' : (data.type || 'success');
        toast.textContent = message;
        toast.className = 'fixed top-4 right-4 z-50 hidden text-white px-5 py-3 rounded-lg shadow-lg text-sm font-medium transition-opacity duration-300';
        if (type === 'error') {
            toast.classList.add('bg-red-600');
        } else if (type === 'info') {
            toast.classList.add('bg-blue-600');
        } else {
            toast.classList.add('bg-green-600');
        }
        toast.classList.remove('hidden');
        setTimeout(function() { toast.classList.add('hidden'); }, 3000);
    });
</script>

</body>
</html>
